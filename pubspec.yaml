name: mova_intelligence_app
description: Приложение MOVA intelligence
version: 1.1.0+2
publish_to: "none"

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.7
  go_router: ^16.2.4
  image_picker: ^1.2.0
  intl: ^0.20.2
  meta: ^1.16.0
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  dio: ^5.9.0
  flutter_dotenv: ^6.0.0 
  provider: ^6.1.2
  google_mlkit_text_recognition: ^0.15.0
  shared_preferences: ^2.2.2
  firebase_core: ^2.30.0
  firebase_messaging: ^14.7.10
  package_info_plus: ^9.0.0
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/app_icon.png
  branding: assets/splash/brand.png
  android_12:
    color: "#FFFFFF"
    image: assets/icon/app_icon.png
    branding: assets/splash/brand.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
    - .env